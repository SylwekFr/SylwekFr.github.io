#______ENVIRONEMENT_LAUNCHPAD______#
#YDES: introduction for the enrionement launchpad
introEnvironement = Actuellement, nous n'avons qu'une seule planète où vivre, et une belle. Même si nous en téraformation une autre (par exemple Mars) \
 cela prendra du temps. Dans cette section, vous trouverez quelques articles sur notre environnement, pourquoi le préserver \
et quelques idées pour avoir un impact positif dessus.
#______TECHNOLOGY_LAUNCHPAD______#
#YDES: introduction for the technology launchpad
introTech = La technologie évolue de plus en plus vite et est de plus en plus interdisciplinaire. Dans cette section, vous trouverez \
des articles sur la technologie dans plusieurs domaines 
#______TRANSHUMANISM_LAUNCHPAD______#
#YDES: introduction for transhumanism launchpad
introTranshumanism = Le transhumanisme a de fortes chances de passer de la science-fiction à la réalité, dans cette section, le transhumanisme sera \
 considéré comme les technologies développées pour améliorer la vie et les avancées scientifiques et technologiques menant à la singularité
#______TRAVEL_LAUNCHPAD______#
#YDES: introduction for travel launchpad
introTravel = Le voyage est une expérience qui nous enrichit. Dans cette section, vous \
trouver des articles sur différents voyages et des conseils en relations avec ses destinations.
#______SPORT_LAUNCHPAD______#
#YDES: introduction for sport launchpad
introSport = L'activité physique est importante pour être en bonne santé et le sport a aussi beaucoup à nous apprendre, \
dans cette section vous trouverez des articles sur différents sports et des faits intéressants à leurs sujet
#______VIDEO_GAME_LAUNCHPAD______#
#YDES: introduction for video game launchpad
introVideoGame = Beaucoup d'entre nous aiment jouer aux jeux vidéo, dans cette section, vous trouverez des \
articles sur certains titres ou faits sur le sujet
#______BOARD_GAME_LAUNCHPAD______#
#YDES: introduction for board game launchpad
introBoardGame = En famille ou entre amis, les jeux de société sont une bonne activité pour passer un bon moment ensemble. \
Dans cette section, vous trouverez des articles sur des jeux ou des faits en realtion avec les jeux vidéo.
#______PERSONAL_DEVELOPMENT_LAUNCHPAD______#
