#______ENVIRONEMENT_LAUNCHPAD______#
#YDES: introduction for the enrionement launchpad
introEnvironement = Actuellement, nous n'avons qu'une seule plan\u00e8te o\u00f9 vivre, et une belle. M\u00eame si nous en t\u00e9raformation une autre (par exemple Mars) \
 cela prendra du temps. Dans cette section, vous trouverez quelques articles sur notre environnement, pourquoi le pr\u00e9server \
et quelques id\u00e9es pour avoir un impact positif dessus.
#______TECHNOLOGY_LAUNCHPAD______#
#YDES: introduction for the technology launchpad
introTech = La technologie \u00e9volue de plus en plus vite et est de plus en plus interdisciplinaire. Dans cette section, vous trouverez \
des articles sur la technologie dans plusieurs domaines 
#______TRANSHUMANISM_LAUNCHPAD______#
#YDES: introduction for transhumanism launchpad
introTranshumanism = Le transhumanisme a de fortes chances de passer de la science-fiction \u00e0 la r\u00e9alit\u00e9, dans cette section, le transhumanisme sera \
 consid\u00e9r\u00e9 comme les technologies d\u00e9velopp\u00e9es pour am\u00e9liorer la vie et les avanc\u00e9es scientifiques et technologiques menant \u00e0 la singularit\u00e9
#______TRAVEL_LAUNCHPAD______#
