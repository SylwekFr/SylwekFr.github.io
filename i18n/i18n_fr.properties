introTravel = Le voyage est une exp\u00e9rience qui nous enrichit. Dans cette section, vous \
trouver des articles sur diff\u00e9rents voyages et des conseils en relations avec ses destinations.
#______SPORT_LAUNCHPAD______#
#YDES: introduction for sport launchpad
